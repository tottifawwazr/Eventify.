<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventify | Global Event Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Lato', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
            },
            boxShadow: {
              'premium': '0 25px 50px -12px rgba(0, 0, 0, 0.08)',
              'premium-dark': '0 30px 60px -12px rgba(0, 0, 0, 0.6)',
              'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
      :root {
        --transition-speed: 0.5s;
        scroll-behavior: smooth;
      }
      body {
        transition: background-color var(--transition-speed) ease-in-out, color var(--transition-speed) ease-in-out;
      }
      .glass {
        @apply bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl border-b border-slate-200/60 dark:border-white/5;
      }
      .glass-card {
        @apply bg-white dark:bg-slate-900/60 backdrop-blur-lg border border-slate-200/50 dark:border-white/5 shadow-premium dark:shadow-premium-dark;
      }
      .hover-lift {
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hover-lift:hover {
        transform: translateY(-12px) scale(1.01);
        @apply shadow-[0_30px_60px_-15px_rgba(79,70,229,0.15)] dark:shadow-[0_30px_60px_-15px_rgba(79,70,229,0.3)];
      }
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        @apply bg-slate-100 dark:bg-slate-950;
      }
      ::-webkit-scrollbar-thumb {
        @apply bg-slate-300 dark:bg-slate-800 rounded-full hover:bg-slate-400 dark:hover:bg-slate-700;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
    <!-- Entry point aplikasi -->
    <script type="module" src="index.tsx"></script>
  </head>
  <body class="bg-[#F8FAFC] dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
    <div id="root"></div>
  </body>
</html>
